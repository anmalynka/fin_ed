services:
  # 1. Backend API (Python/FastAPI)
  - type: web
    name: finadvisor-backend-v8
    env: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: PYTHONPATH
        value: .

  # 2. Frontend (Static Site / Vite React)
  - type: web
    name: finadvisor-frontend-v8
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: finadvisor-backend-v8
          property: host
