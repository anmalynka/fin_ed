services:
  # Backend API (Python/FastAPI)
  - type: web
    name: finadvisor-api
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
    rootDirectory: backend

  # Frontend (Static Site / Vite React)
  - type: static
    name: finadvisor-ui
    env: static
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    publishPath: ./dist
    rootDirectory: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://finadvisor-api.onrender.com # Update this after first deployment
