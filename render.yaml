services:
  # 1. Backend API (Your current 'fin-ed' service)
  - type: web
    name: fin-ed
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: PYTHONPATH
        value: .

  # 2. Frontend UI (Your current 'fin-advisor-ui' service)
  - type: static
    name: fin-advisor-ui
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fin-ed
          property: host
