services:
  # 1. Backend (Matches your successful v3 service)
  - type: web
    name: fin-advisor-api-v3
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: PYTHONPATH
        value: .

  # 2. Frontend (Static Site to fix UI 404)
  - type: static
    name: fin-advisor-ui
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fin-advisor-api-v3
          property: host
