services:
  # 1. Backend (FastAPI)
  - type: web
    name: fin-advisor-backend-v9
    env: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"

  # 2. Frontend (Static Site)
  - type: static
    name: fin-advisor-frontend-v9
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fin-advisor-backend-v9
          property: host
