services:
  # 1. Backend API (Python/FastAPI)
  - type: web
    name: fin-advisor-api-v3
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
    rootDir: backend

  # 2. Frontend (Static Site / Vite React)
  # Correct Blueprint configuration for Static Sites:
  - type: web
    name: fin-advisor-ui
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fin-advisor-api-v3
          property: url
